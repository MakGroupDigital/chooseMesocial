name: choose_me
description: Choose-Me - Réseau social sportif connectant talents, recruteurs, clubs et presse.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # UI Components
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  chewie: ^1.11.3
  dropdown_button2: ^2.3.9
  flutter_animate: ^4.5.0
  flutter_rating_bar: ^4.0.1
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.1.0
  lottie: ^3.1.2
  percent_indicator: ^4.2.2
  pin_code_fields: ^8.0.1
  smooth_page_indicator: ^1.1.0
  cupertino_icons: ^1.0.0

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.7
  firebase_performance: ^0.10.1+7

  # Authentication
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1

  # Navigation & State
  go_router: ^12.1.3
  provider: ^6.1.5

  # Storage & Data
  shared_preferences: ^2.5.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  flutter_cache_manager: ^3.4.1

  # Media
  image_picker: ^1.1.2
  file_picker: ^10.1.9
  video_player: ^2.10.0

  # Utilities
  collection: ^1.19.1
  intl: ^0.20.2
  uuid: ^4.0.0
  rxdart: ^0.27.7
  easy_debounce: ^2.0.1
  timeago: ^3.7.1
  from_css_color: ^2.0.0
  csslib: ^1.0.2
  html: ^0.15.6
  json_path: ^0.7.2
  mime_type: ^1.0.0
  stream_transform: ^2.1.0
  stop_watch_timer: ^3.0.2

  # Platform Features
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  wakelock_plus: ^1.3.2
  webview_flutter: ^4.13.0
  infinite_scroll_pagination: ^4.0.0
  page_transition: ^2.1.0
  pointer_interceptor: ^0.10.1+2
  plugin_platform_interface: ^2.1.8

  # FlutterFlow specific
  webviewx_plus:
    git:
      url: https://github.com/FlutterFlow/webviewx_plus.git
      ref: 4f84ece5e06d52643c5d844f41880baf8440c584

  webview_flutter_android: any
  crypto: any
dependency_overrides:
  http: ^1.4.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  image: ^4.2.0
  lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  web:
    generate: true
  image_path: 'assets/images/app_launcher_icon.png'
  adaptive_icon_background: '#00000000'
  adaptive_icon_foreground: 'assets/images/adaptive_foreground_icon.png'

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/
